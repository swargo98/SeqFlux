name: Import SeqFlux contents

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Clone source repository
        run: |
          git clone --branch seqflux-final --single-branch https://github.com/swargo98/FastBioDL-Adaptive-Parallel_Downloader.git /tmp/seqflux-source

      - name: Replace target contents
        run: |
          shopt -s dotglob nullglob
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a --delete --exclude='.git' /tmp/seqflux-source/ ./

      - name: Commit imported contents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to import."
            exit 0
          fi
          git commit -m "Import SeqFlux project contents"
          git push origin HEAD:main
